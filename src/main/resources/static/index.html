<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscrybe · Tablero</title>
    <link rel="stylesheet" href="./css/dashboard.css?v=7" />
  </head>
  <body>
    <div id="login-overlay" class="login-overlay">
      <form id="login-form" class="login-card" autocomplete="on">
        <h1 class="login-brand">Subscrybe</h1>
        <h2 id="login-title">Iniciar sesión</h2>

        <label id="login-name-row" class="login-field">
          <span>Nombre</span>
          <input id="login-name" type="text" placeholder="Tu nombre" />
        </label>

        <label class="login-field">
          <span>Correo</span>
          <input id="login-email" type="email" placeholder="tucorreo@gmail.com" required />
        </label>

        <label class="login-field">
          <span>Contraseña</span>
          <input id="login-password" type="password" placeholder="••••••••" required />
        </label>

        <button id="login-submit" type="submit" class="login-btn">Entrar</button>
        <p id="login-feedback" class="login-feedback"></p>
        <button id="login-toggle" type="button" class="login-link">
          ¿No tienes cuenta? Crear una
        </button>
      </form>
    </div>

    <div id="app-root" style="display: none">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Subscrybe</h1>
        <p>Tablero de suscripciones · próximos pagos y análisis financiero</p>
      </div>
      <div class="session">
        <div class="session-avatar" id="session-avatar" aria-hidden="true"></div>
        <div class="session-info">
          <span class="session-name" id="session-name"></span>
          <span class="session-email" id="session-email"></span>
        </div>
        <button id="logout-btn" class="logout-btn" type="button">Cerrar sesión</button>
      </div>
    </header>

    <section class="toolbar">
      <button id="scan-btn" class="tool-btn tool-btn-primary" type="button">
        🔍 Escanear mi Gmail
      </button>

      <form id="add-form" class="add-form">
        <input id="add-name" type="text" placeholder="Nombre (ej. Netflix)" required />
        <input id="add-cost" type="number" step="0.01" min="0" placeholder="Costo" required />
        <select id="add-cycle">
          <option value="MONTHLY">Mensual</option>
          <option value="ANNUAL">Anual</option>
        </select>
        <input id="add-date" type="date" required />
        <button class="tool-btn" type="submit">+ Agregar</button>
      </form>

      <span id="tool-msg" class="tool-msg"></span>
    </section>

    <main class="dashboard">
      <section class="panel" aria-labelledby="analysis-title">
        <h2 id="analysis-title">Análisis financiero</h2>
        <div id="analysis" class="analysis-grid"></div>
      </section>

      <div class="main-col">
        <section class="panel" aria-labelledby="payments-title">
          <h2 id="payments-title">Próximos pagos</h2>
          <p id="status" class="status"></p>
          <div id="payments" class="payments-grid"></div>
        </section>

        <section class="panel" aria-labelledby="chart-title">
          <h2 id="chart-title">Distribución del gasto mensual</h2>
          <div id="chart" class="chart-wrap"></div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <small>Subscrybe · Gestor de suscripciones</small>
    </footer>
    </div>

    <script type="module" src="./js/main.js?v=7"></script>
  </body>
</html>
