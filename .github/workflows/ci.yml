name: Subscrybe CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Give run permissions to Maven Wrapper
        run: chmod +x ./mvnw

      - name: Run Unit Tests
        run: ./mvnw clean test

      - name: Verify Docker image build
        run: docker build -t subscrybe-backend .